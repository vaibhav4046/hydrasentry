name: CI

# Always-shippable gate for HydraSentry: backend pytest (Python 3.13) plus
# frontend install + lint + production build. Runs on every push to main and on
# every pull request so the core can never silently regress.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref so a fast follow-up push is not stuck
# behind a stale run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend (pytest, Python 3.13)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # No secrets are provided in CI: real_run.run_real exercises the
      # fail-closed deterministic fallback path, which the suite asserts. The
      # live real-Groq path is verified out of band against the deployment.
      - name: Run tests
        run: python -m pytest -q

  frontend:
    name: Frontend (lint + build, Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
